name: Bazel RBE

on:
  pull_request:
    paths:
      - ".bazel*"
      - ".github/actionlint.yaml"
      - ".github/workflows/bazel-rbe.yml"
      - "BUILD.bazel"
      - "Cargo.lock"
      - "Cargo.toml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - "Makefile"
      - "electron.vite.config.ts"
      - "package-lock.json"
      - "package.json"
      - "scripts/run-bazel-rbe.sh"
      - "sdk/js/package.json"
      - "sdk/rust/kestrel-sdk/Cargo.toml"
      - "tools/bazel/**"
      - "tsconfig*.json"
  push:
    branches: [main]
    paths:
      - ".bazel*"
      - ".github/actionlint.yaml"
      - ".github/workflows/bazel-rbe.yml"
      - "BUILD.bazel"
      - "Cargo.lock"
      - "Cargo.toml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - "Makefile"
      - "electron.vite.config.ts"
      - "package-lock.json"
      - "package.json"
      - "scripts/run-bazel-rbe.sh"
      - "sdk/js/package.json"
      - "sdk/rust/kestrel-sdk/Cargo.toml"
      - "tools/bazel/**"
      - "tsconfig*.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || vars.BAZEL_RBE_ENABLED == 'true'
    runs-on:
      - self-hosted
      - evalops-kestrel-rbe
      - bazel-rbe
    timeout-minutes: 20
    env:
      BAZEL_RBE_USE_EXISTING_TUNNEL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go for Bazel tools
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
          cache: false
      - name: Install Bazel tools
        env:
          GOBIN: ${{ runner.temp }}/bazel-tools
        run: |
          mkdir -p "${GOBIN}"
          echo "${GOBIN}" >> "${GITHUB_PATH}"
          go install github.com/bazelbuild/bazelisk@latest
          go install github.com/bazelbuild/buildtools/buildifier@latest
      - name: Run Bazel checks
        run: make bazel-check
      - name: Run Bazel RBE smoke
        run: make bazel-rbe-smoke
