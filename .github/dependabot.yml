version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: electron
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: "/sdk/js"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      sdk-js-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
